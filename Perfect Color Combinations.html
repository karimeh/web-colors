<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Color Combinations – Best Uses & Pairings</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 24px 16px 60px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 48px;
        }
        header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #0f172a;
        }
        header p {
            color: var(--text-light);
            font-size: 1.05rem;
            margin-top: 6px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .combinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .combo-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: box-shadow var(--transition), transform var(--transition);
            display: flex;
            flex-direction: column;
        }
        .combo-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .swatch-strip {
            display: flex;
            height: 80px;
        }
        .swatch-segment {
            flex: 1;
            position: relative;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .swatch-segment:hover {
            filter: brightness(1.08);
        }
        .swatch-hex-tooltip {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .swatch-segment:hover .swatch-hex-tooltip {
            opacity: 1;
        }

        .combo-info {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .combo-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
        }

        .combo-codes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .hex-badge {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.8rem;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            user-select: all;
            color: #334155;
            transition: background 0.15s;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .hex-badge .mini-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .hex-badge:hover {
            background: #e2e8f0;
        }
        .hex-badge.copied {
            background: #d4edda;
            color: #155724;
        }

        .use-case {
            font-size: 0.88rem;
            color: #475569;
            line-height: 1.5;
            margin-top: 4px;
        }
        .use-case strong {
            color: #0f172a;
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 2px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            text-align: center;
            color: #94a3b8;
            margin-top: 48px;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.9rem; }
            .combinations-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Perfect Color Combinations</h1>
            <p>Curated pairings that work beautifully together – with the best use cases for each.</p>
        </header>

        <div class="combinations-grid" id="combinationsGrid"></div>

        <footer>
            <p>✨ Click any hex code to copy it. Combine with confidence – these palettes are tried and tested.</p>
        </footer>
    </div>

    <div class="toast" id="toast">✅ Hex copied!</div>

    <script>
        (function() {
            const combinations = [
                {
                    title: "Navy & Gold",
                    colors: [
                        { hex: "#0f172a", label: "Deep Navy" },
                        { hex: "#eab308", label: "Gold" }
                    ],
                    useCase: "Luxury, corporate, high‑end fashion. Conveys elegance and prestige. Works beautifully for hero sections, branding, and premium product pages."
                },
                {
                    title: "Teal & Coral",
                    colors: [
                        { hex: "#0d9488", label: "Teal" },
                        { hex: "#f43f5e", label: "Coral" }
                    ],
                    useCase: "Modern, energetic, creative. Perfect for tech startups, lifestyle blogs, and apps that want a fresh, friendly vibe. Great contrast without harshness."
                },
                {
                    title: "Soft Pink & Sage Green",
                    colors: [
                        { hex: "#f9a8d4", label: "Soft Pink" },
                        { hex: "#86efac", label: "Sage Green" }
                    ],
                    useCase: "Wellness, beauty, feminine brands. Calming and organic. Ideal for spa websites, cosmetics, and health apps."
                },
                {
                    title: "Royal Blue & Orange",
                    colors: [
                        { hex: "#2563eb", label: "Royal Blue" },
                        { hex: "#f97316", label: "Orange" }
                    ],
                    useCase: "Trustworthy yet energetic. Common in e‑commerce, sports brands, and call‑to‑action designs. Blue builds confidence; orange drives action."
                },
                {
                    title: "Charcoal & Mustard",
                    colors: [
                        { hex: "#334155", label: "Charcoal" },
                        { hex: "#eab308", label: "Mustard" }
                    ],
                    useCase: "Retro, sophisticated, artistic. Excellent for portfolio sites, design agencies, and editorial layouts. Adds warmth to dark themes."
                },
                {
                    title: "Burgundy & Blush",
                    colors: [
                        { hex: "#9f1239", label: "Burgundy" },
                        { hex: "#fbcfe8", label: "Blush" }
                    ],
                    useCase: "Romantic, vintage, luxurious. Suits wedding sites, fashion lookbooks, and elegant branding. Rich and inviting."
                },
                {
                    title: "Mint & White",
                    colors: [
                        { hex: "#5eead4", label: "Mint" },
                        { hex: "#ffffff", label: "White" }
                    ],
                    useCase: "Minimal, clean, refreshing. Ideal for SaaS dashboards, medical apps, and modern UI. Feels open and hygienic."
                },
                {
                    title: "Lilac & Sand",
                    colors: [
                        { hex: "#c084fc", label: "Lilac" },
                        { hex: "#fde047", label: "Sand" }
                    ],
                    useCase: "Creative, soft, approachable. Works well for educational platforms, children’s products, and artistic communities. Playful yet muted."
                },
                {
                    title: "Forest Green & Terracotta",
                    colors: [
                        { hex: "#166534", label: "Forest Green" },
                        { hex: "#d97706", label: "Terracotta" }
                    ],
                    useCase: "Nature, organic, earthy. Perfect for sustainable brands, outdoor gear, and farm‑to‑table restaurants. Grounded and authentic."
                },
                {
                    title: "Slate Gray & Electric Blue",
                    colors: [
                        { hex: "#64748b", label: "Slate Gray" },
                        { hex: "#06b6d4", label: "Electric Blue" }
                    ],
                    useCase: "Corporate, tech, professional. Great for dashboards, business tools, and modern enterprise sites. Neutral base with a pop of innovation."
                },
                {
                    title: "Lemon & Charcoal",
                    colors: [
                        { hex: "#facc15", label: "Lemon" },
                        { hex: "#1e293b", label: "Charcoal" }
                    ],
                    useCase: "High contrast, youthful, attention‑grabbing. Effective for event pages, gaming, and entertainment. Use lemon sparingly to highlight key elements."
                },
                {
                    title: "Dusty Rose & Olive",
                    colors: [
                        { hex: "#e11d48", label: "Dusty Rose" },
                        { hex: "#4d7c0f", label: "Olive" }
                    ],
                    useCase: "Vintage, bohemian, warm. Fits handmade goods, artisan shops, and cozy home décor brands. Comforting and distinctive."
                }
            ];

            const grid = document.getElementById('combinationsGrid');
            const toast = document.getElementById('toast');
            let toastTimer;

            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
            }

            async function copyToClipboard(text) {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } else {
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.position = 'fixed';
                        ta.style.left = '-9999px';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        const success = document.execCommand('copy');
                        document.body.removeChild(ta);
                        return success;
                    }
                } catch (err) {
                    return false;
                }
            }

            combinations.forEach(combo => {
                const card = document.createElement('div');
                card.className = 'combo-card';

                // Swatch strip
                const strip = document.createElement('div');
                strip.className = 'swatch-strip';
                combo.colors.forEach(c => {
                    const seg = document.createElement('div');
                    seg.className = 'swatch-segment';
                    seg.style.backgroundColor = c.hex;
                    const tooltip = document.createElement('span');
                    tooltip.className = 'swatch-hex-tooltip';
                    tooltip.textContent = c.hex;
                    seg.appendChild(tooltip);
                    strip.appendChild(seg);
                });

                // Info
                const info = document.createElement('div');
                info.className = 'combo-info';

                const titleEl = document.createElement('div');
                titleEl.className = 'combo-title';
                titleEl.textContent = combo.title;

                const codesRow = document.createElement('div');
                codesRow.className = 'combo-codes';
                combo.colors.forEach(c => {
                    const badge = document.createElement('span');
                    badge.className = 'hex-badge';
                    badge.setAttribute('data-hex', c.hex);
                    const mini = document.createElement('span');
                    mini.className = 'mini-swatch';
                    mini.style.backgroundColor = c.hex;
                    badge.appendChild(mini);
                    badge.appendChild(document.createTextNode(c.hex));
                    codesRow.appendChild(badge);
                });

                const useCaseEl = document.createElement('div');
                useCaseEl.className = 'use-case';
                useCaseEl.innerHTML = `<strong>Best uses:</strong> ${combo.useCase}`;

                info.appendChild(titleEl);
                info.appendChild(codesRow);
                info.appendChild(useCaseEl);
                card.appendChild(strip);
                card.appendChild(info);
                grid.appendChild(card);
            });

            // Copy handling
            grid.addEventListener('click', async (e) => {
                const badge = e.target.closest('.hex-badge');
                if (!badge) return;
                const hex = badge.getAttribute('data-hex');
                if (!hex) return;
                const success = await copyToClipboard(hex);
                if (success) {
                    badge.classList.add('copied');
                    setTimeout(() => badge.classList.remove('copied'), 600);
                    showToast(`✅ ${hex} copied!`);
                } else {
                    showToast('⚠️ Copy failed');
                }
            });

            console.log('🎯 Color combinations guide ready. Click any hex badge to copy.');
        })();
    </script>
</body>
</html>
